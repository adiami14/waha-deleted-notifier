<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Notify Delete — ניהול{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; direction: rtl; }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Nav ─────────────────────────────────────────────────────────────── */
    nav {
      background: #1a73e8; color: #fff;
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1.5rem; position: relative;
    }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #fff; white-space: nowrap; }
    nav .nav-links { display: flex; align-items: center; gap: 1rem; flex: 1; }
    nav .nav-links a { color: rgba(255,255,255,0.85); font-size: 0.95rem; }
    nav .nav-links a:hover { color: #fff; text-decoration: none; }
    nav .spacer { flex: 1; }
    nav form { margin: 0; }
    nav .nav-logout button {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; padding: 0.3rem 0.8rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem;
    }
    nav .nav-logout button:hover { background: rgba(255,255,255,0.25); }

    /* Hamburger toggle — hidden on desktop */
    .nav-toggle {
      display: none; flex-direction: column; justify-content: center; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px; margin-right: auto;
    }
    .nav-toggle span {
      display: block; width: 22px; height: 2px; background: #fff; border-radius: 2px;
      transition: transform 0.2s, opacity 0.2s;
    }

    /* ── Flash ───────────────────────────────────────────────────────────── */
    .flash { padding: 0.75rem 1.25rem; border-radius: 6px; margin: 1rem 1rem 0; font-size: 0.95rem; }
    .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .flash.warning { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }

    /* ── Main content ────────────────────────────────────────────────────── */
    main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 1.25rem; }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); padding: 1.5rem; margin-bottom: 1.5rem; }

    /* ── Tables ──────────────────────────────────────────────────────────── */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 600px; }
    th { background: #f0f0f0; text-align: right; padding: 0.6rem 0.75rem; font-weight: 600; border-bottom: 2px solid #ddd; white-space: nowrap; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #eee; vertical-align: middle; }
    tr:hover td { background: #fafafa; }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }
    .badge-green  { background: #d4edda; color: #155724; }
    .badge-gray   { background: #e2e3e5; color: #495057; }
    .badge-yellow { background: #fff3cd; color: #856404; }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn { display: inline-block; padding: 0.35rem 0.8rem; border-radius: 5px; font-size: 0.85rem;
           border: 1px solid transparent; cursor: pointer; font-family: inherit; }
    .btn-primary   { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .btn-primary:hover { background: #1558b0; }
    .btn-outline   { background: #fff; color: #444; border-color: #bbb; }
    .btn-outline:hover { background: #f5f5f5; }
    .btn-danger    { background: #dc3545; color: #fff; border-color: #dc3545; }
    .btn-danger:hover { background: #a71d2a; }
    .btn-sm { padding: 0.2rem 0.55rem; font-size: 0.78rem; }

    /* ── Forms ───────────────────────────────────────────────────────────── */
    .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
    label { font-size: 0.85rem; font-weight: 600; color: #555; }
    input[type=text], input[type=password] {
      padding: 0.4rem 0.65rem; border: 1px solid #ccc; border-radius: 5px;
      font-size: 0.9rem; font-family: inherit; min-width: 160px; width: 100%;
    }
    input:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.15); }

    /* ── Actions column ──────────────────────────────────────────────────── */
    .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    /* ── Mobile (≤ 720px) ────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      nav { flex-wrap: wrap; gap: 0; padding: 0.6rem 1rem; }
      nav .brand { flex: 1; font-size: 1rem; }
      .nav-toggle { display: flex; }
      .nav-links {
        display: none; flex-direction: column; align-items: flex-start;
        width: 100%; padding: 0.5rem 0 0.25rem; gap: 0.5rem;
        border-top: 1px solid rgba(255,255,255,0.25); margin-top: 0.5rem;
      }
      .nav-links.open { display: flex; }
      .flash { margin: 0.75rem 0 0; border-radius: 0; }
      .card { padding: 1rem; }
    }
  </style>
</head>
<body>

{% if not request.headers.get('x-management-embedded') %}
<nav>
  <span class="brand">📵 Notify Delete</span>
  <button class="nav-toggle" id="navToggle" aria-label="תפריט">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links" id="navLinks">
    <a href="/admin/dashboard">סטטוס</a>
    <a href="/admin/incidents">🚨 אירועים</a>
    <span class="spacer"></span>
    <div class="nav-logout">
      <form method="post" action="/admin/logout">
        <button type="submit">התנתק</button>
      </form>
    </div>
  </div>
</nav>
<script>
  document.getElementById('navToggle').addEventListener('click', function() {
    document.getElementById('navLinks').classList.toggle('open');
  });
</script>
{% endif %}

{% if flash %}
<div class="flash {{ flash.k }}">{{ flash.m }}</div>
{% endif %}

<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
