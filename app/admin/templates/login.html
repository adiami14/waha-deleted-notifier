<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notify Delete — כניסה</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      direction: rtl;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
    label { font-size: 0.85rem; font-weight: 600; color: #555; }
    input[type=text], input[type=password] {
      padding: 0.5rem 0.7rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26,115,232,0.15);
    }
    .btn-submit {
      width: 100%;
      padding: 0.6rem;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: #1558b0; }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
<div class="login-card">
  <h1>📵 Notify Delete</h1>
  <p class="subtitle">כניסה למערכת הניהול</p>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/admin/login">
    <div class="form-group">
      <label for="username">שם משתמש</label>
      <input type="text" id="username" name="username" autofocus autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">סיסמה</label>
      <input type="password" id="password" name="password" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-submit">כניסה</button>
  </form>
</div>
</body>
</html>
